[package]
name = "crateful"
version = "0.1.0"
edition = "2021"

[dependencies]
rodio = "0.17"  # Check for the latest version on crates.io
eframe = { version = "0.24", features = ["default_fonts"]} # 0.24 is compatible with Egui 0.24
rfd = "0.12"     # For the file dialog
serde = { version = "1.0", features = ["derive"] } # For config file handling (if needed later)
walkdir = "2.4"

[package]
name = "crateful"
version = "0.1.0"
edition = "2021"

[dependencies]
egui = "0.24.1"
eframe = { version = "0.24.1", features = ["persistence"] }
symphonia = { version = "0.5.3", features = ["mp3", "flac", "wav"] }
symphonia-bundle-mp3 = "0.5.3"  # MP3 support
cpal = "0.15.2"                # Audio output
walkdir = "2.4"
parking_lot = "0.12.1"
anyhow = "1.0.75"
crossbeam-channel = "0.5.8"    # For audio thread communication
